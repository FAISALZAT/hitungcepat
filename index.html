<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HitungCepat</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Oxanium:wght@500;700;800&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Chakra Petch',sans-serif;
  min-height:100vh;
  overflow-x:hidden;

  background:
  radial-gradient(circle at top left,#7928ff 0%,transparent 30%),
  radial-gradient(circle at bottom right,#00e5ff 0%,transparent 30%),
  linear-gradient(135deg,#090814,#16102f,#0a0a16);

  display:flex;
  justify-content:center;
  align-items:flex-start;

  padding:12px;

  color:white;
}

/* FALLING FORMULAS */

#fallingMath{
  position:fixed;
  inset:0;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

.math-fall{
  position:absolute;
  top:-120px;

  color:rgba(255,255,255,0.12);

  font-family:'Oxanium',sans-serif;
  font-weight:700;

  white-space:nowrap;

  animation-name:fallDown;
  animation-timing-function:linear;
  animation-iteration-count:infinite;
}

@keyframes fallDown{

  0%{
    transform:
    translateY(-120px)
    rotate(0deg);

    opacity:0;
  }

  10%{
    opacity:1;
  }

  100%{
    transform:
    translateY(120vh)
    rotate(8deg);

    opacity:0;
  }
}

/* APP */

.app{
  position:relative;
  z-index:2;

  width:100%;
  max-width:430px;

  display:flex;
  flex-direction:column;

  padding-bottom:30px;
}

/* GLASS */

.glass{
  background:rgba(255,255,255,0.08);

  border:1px solid rgba(255,255,255,0.12);

  backdrop-filter:blur(18px);

  border-radius:28px;

  box-shadow:
  0 10px 35px rgba(0,0,0,0.35);
}

/* START SCREEN */

.start-screen{
  margin-top:70px;
  text-align:center;
}

.logo{
  font-family:'Oxanium',sans-serif;

  font-size:58px;
  font-weight:800;

  background:
  linear-gradient(90deg,#00e5ff,#ff00d4);

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  letter-spacing:2px;
}

.tagline{
  margin-top:14px;
  color:#d8d8d8;
  font-size:16px;
}

.start-card{
  margin-top:38px;
  padding:28px;
}

.start-btn{
  width:100%;
  height:74px;

  border:none;
  border-radius:24px;

  cursor:pointer;

  font-family:'Chakra Petch',sans-serif;

  font-size:24px;
  font-weight:800;

  background:
  linear-gradient(90deg,#00e5ff,#8aff00);

  color:#111;

  box-shadow:
  0 0 25px rgba(0,229,255,0.35);

  transition:0.2s;
}

.start-btn:active{
  transform:scale(0.97);
}

/* MENU */

.menu-screen{
  display:none;
  margin-top:30px;
}

.menu-card{
  padding:24px;
}

.section-title{
  margin-bottom:14px;
  margin-top:12px;

  font-size:18px;
  font-weight:700;
}

.option-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.option-btn{
  height:62px;

  border:none;
  border-radius:18px;

  cursor:pointer;

  font-family:'Chakra Petch',sans-serif;

  color:white;

  font-size:16px;
  font-weight:700;

  background:
  linear-gradient(
  145deg,
  rgba(255,255,255,0.1),
  rgba(255,255,255,0.05));

  border:1px solid rgba(255,255,255,0.08);

  transition:0.2s;
}

.option-btn.active{
  background:
  linear-gradient(90deg,#00e5ff,#7f5af0,#ff00d4);

  box-shadow:
  0 0 18px rgba(0,229,255,0.4);
}

.name-input{
  width:100%;
  height:60px;

  margin-bottom:20px;

  border:none;
  border-radius:18px;

  padding:0 18px;

  background:
  rgba(255,255,255,0.08);

  color:white;

  font-family:'Chakra Petch',sans-serif;
  font-size:18px;

  outline:none;
}

.name-input::placeholder{
  color:#cfcfcf;
}

.play-btn{
  width:100%;
  margin-top:28px;

  height:70px;

  border:none;
  border-radius:22px;

  cursor:pointer;

  font-family:'Chakra Petch',sans-serif;

  font-size:22px;
  font-weight:800;

  background:
  linear-gradient(90deg,#00e5ff,#8aff00);

  color:#111;
}

/* GAME */

.game-screen{
  display:none;
  flex-direction:column;
  margin-top:10px;
}

/* TOP */

.top-bar{
  display:flex;
  gap:14px;
}

.score-card{
  flex:1;
  padding:16px;
  text-align:center;
}

.score-label{
  font-size:13px;
  color:#ddd;
}

.score-value{
  margin-top:4px;

  font-family:'Oxanium',sans-serif;

  font-size:32px;
  font-weight:800;
}

/* BOARD */

.board{
  margin-top:22px;
  padding:28px 20px;
  text-align:center;
}

.level-badge{
  display:inline-block;

  padding:8px 18px;

  border-radius:999px;

  background:
  linear-gradient(90deg,#ff00d4,#7f5af0);

  font-family:'Oxanium',sans-serif;

  font-size:14px;
  font-weight:700;
}

.timer{
  margin-top:18px;

  font-family:'Oxanium',sans-serif;

  font-size:20px;
  font-weight:700;

  color:#00e5ff;
}

.question{
  margin-top:30px;

  font-family:'Oxanium',sans-serif;

  font-size:58px;
  font-weight:800;

  letter-spacing:3px;

  min-height:80px;
}

.message{
  margin-top:18px;

  min-height:30px;

  font-size:20px;
  font-weight:700;
}

.game-over{
  margin-top:18px;

  font-size:26px;
  font-weight:800;

  color:#ffe600;
}

/* ANSWERS */

.answers{
  margin-top:26px;

  display:flex;
  gap:14px;
}

.answer-btn{
  flex:1;

  height:92px;

  border:none;
  border-radius:24px;

  cursor:pointer;

  background:
  linear-gradient(
  145deg,
  rgba(255,255,255,0.16),
  rgba(255,255,255,0.05));

  border:1px solid rgba(255,255,255,0.08);

  color:white;

  font-family:'Chakra Petch',sans-serif;

  font-size:32px;
  font-weight:800;

  transition:0.15s;
}

.answer-btn:active{
  transform:scale(0.95);
}

/* BUTTONS */

.bottom-buttons{
  margin-top:22px;

  display:flex;
  gap:12px;
}

.bottom-btn{
  flex:1;

  height:60px;

  border:none;
  border-radius:18px;

  cursor:pointer;

  font-family:'Chakra Petch',sans-serif;

  font-size:16px;
  font-weight:700;
}

.restart-btn{
  background:
  linear-gradient(90deg,#00e5ff,#00ffa3);

  color:#111;
}

.menu-btn{
  background:
  rgba(255,255,255,0.12);

  color:white;
}

/* LEADERBOARD */

.leaderboard{
  margin-top:22px;
  padding:22px;
}

.leaderboard h2{
  text-align:center;
  margin-bottom:16px;

  font-family:'Oxanium',sans-serif;
}

.leaderboard-item{
  display:flex;
  justify-content:space-between;

  padding:12px 14px;

  margin-bottom:10px;

  border-radius:14px;

  background:
  rgba(255,255,255,0.08);

  font-weight:700;
}

/* MOBILE */

@media(max-width:480px){

  .question{
    font-size:48px;
  }

  .answer-btn{
    height:78px;
    font-size:26px;
  }

}

</style>
</head>
<body>

<!-- FALLING MATH -->
<div id="fallingMath"></div>

<div class="app">

  <!-- START -->
  <div class="start-screen" id="startScreen">

    <div class="logo">
      ⚡ HitungCepat
    </div>

    <div class="tagline">
      Latih fokus dan refleks matematikamu!
    </div>

    <div class="start-card glass">

      <button class="start-btn"
      onclick="openMenu()">
      ▶ START
      </button>

    <div style="margin-top:24px;text-align:center;">

      <div style="
      font-size:12px;
      color:#d0d0d0;
      margin-bottom:10px;
      letter-spacing:1px;
      ">
      report bug
      </div>

      <a href="https://www.instagram.com/hitungcepat.id?igsh=azMyYjN0bWdneDN1"
      target="_blank"
      style="
      display:inline-flex;
      align-items:center;
      justify-content:center;
      width:64px;
      height:64px;
      border-radius:50%;
      text-decoration:none;
      background:linear-gradient(135deg,#feda75,#fa7e1e,#d62976,#962fbf,#4f5bd5);

  </div>

  <!-- MENU -->
  <div class="menu-screen" id="menuScreen">

    <div class="menu-card glass">

      <input
      type="text"

        </button>

        <button class="option-btn"
        onclick="selectLevel('normal',this)">

        </button>

        onclick="selectLevel('hard',this)">

        </button>

      <button class="play-btn"
      onclick="startGame()">
      ▶ MULAI GAME
      </button>

    </div>

  </div>

  <!-- GAME -->
  <div class="game-screen" id="gameScreen">

    <div class="top-bar">

      <div class="score-card glass">
        <div class="score-label">SKOR</div>
        <div class="score-value" id="score">0</div>
      </div>

      <div class="score-card glass">
        <div class="score-label">BEST</div>
        <div class="score-value" id="bestScore">0</div>
      </div>

    </div>

    <div class="board glass">

      <div class="level-badge"
      id="levelBadge">
      EASY
      </div>

      <div class="timer">
        ⏳ <span id="time">60</span>s
      </div>

      <div class="question"
      id="question">
      5 + 5
      </div>

      <div class="message"
      id="message"></div>

      <div class="game-over"
      id="gameOver"></div>

    </div>

    <div class="answers">

      <button class="answer-btn"
      id="btn0"
      onclick="selectAnswer(0)">
      0
      </button>

      <button class="answer-btn"
      id="btn1"
      onclick="selectAnswer(1)">
      0
      </button>

      <button class="answer-btn"
      id="btn2"
      onclick="selectAnswer(2)">
      0
      </button>

    </div>

    <div class="bottom-buttons">

      <button class="bottom-btn restart-btn"
      onclick="restartGame()">
      🔄 Ulang
      </button>

      <button class="bottom-btn menu-btn"
      onclick="backMenu()">
      🏠 Menu
      </button>

    </div>

    </div>

    <div class="leaderboard glass">
      <h2>🏆 TOP 10 ONLINE</h2>
      <div id="leaderboardList"></div>
    </div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc,
  query,
  orderBy,
  limit,
  getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* GANTI DENGAN CONFIG FIREBASE KAMU */

const firebaseConfig = {

  apiKey: "ISI_API_KEY",
  authDomain: "ISI_AUTH_DOMAIN",
  projectId: "ISI_PROJECT_ID",
  storageBucket: "ISI_BUCKET",
  messagingSenderId: "ISI_SENDER_ID",
  appId: "ISI_APP_ID"

};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* GAME VARIABLES */

let score = 0;

let bestScore =
0;

let selectedLevel = "veryeasy";
let selectedTime = 60;

let correctAnswer = 0;

let timer = null;
let timeLeft = 60;
let gameActive = false;

bestScore = parseInt(localStorage.getItem("hitungcepat_best") || "0");

document.getElementById("bestScore")
.innerText = bestScore;


/* FALLING FORMULAS */

const formulas = [

  "5 + 7 = 12",
  "12 × 8 = 96",
  "√144 = 12",
  "9² = 81",
  "π = 3.14",
  "7 × 6 = 42",
  "2πr",
  "Σ x",
  "a² + b²"

];

function createFallingFormula(){

  const formula =
  document.createElement("div");

  formula.classList.add("math-fall");

  formula.innerText =
  formulas[
    Math.floor(
      Math.random() * formulas.length
    )
  ];

  formula.style.left =
  Math.random() * 100 + "vw";

  formula.style.fontSize =
  (18 + Math.random() * 18) + "px";

  formula.style.animationDuration =
  (5 + Math.random() * 7) + "s";

  document.getElementById("fallingMath")
  .appendChild(formula);

  setTimeout(() => {
    formula.remove();
  },12000);
}

setInterval(() => {
  createFallingFormula();
},500);

/* MENU */

window.openMenu = function(){

  document.getElementById("startScreen")
  .style.display = "none";

  document.getElementById("menuScreen")
  .style.display = "block";
}

/* LEVEL */

window.selectLevel = function(level,btn){

  selectedLevel = level;

  const buttons =
  document.querySelectorAll(".option-group")[0]
  .querySelectorAll(".option-btn");

  buttons.forEach(button =>
  button.classList.remove("active"));

  btn.classList.add("active");
}

/* TIME */

window.selectTime = function(time,btn){

  selectedTime = time;

  const buttons =
  document.querySelectorAll(".option-group")[1]
  .querySelectorAll(".option-btn");

  buttons.forEach(button =>
  button.classList.remove("active"));

  btn.classList.add("active");
}

/* RANDOM */

function random(min,max){

  return Math.floor(
    Math.random()*(max-min+1)
  ) + min;
}

/* START */

window.startGame = function(){

  initAudio();

  clearInterval(timer);

  score = 0;
  timeLeft = selectedTime;
  gameActive = true;

  document.getElementById("score")
  .innerText = score;

  document.getElementById("time")
  .innerText = timeLeft;

  document.getElementById("message")
  .innerText = "";

  document.getElementById("gameOver")
  .innerText = "";

  document.getElementById("menuScreen")
  .style.display = "none";

  document.getElementById("gameScreen")
  .style.display = "flex";

  document.getElementById("levelBadge")
  .innerText =
  selectedLevel.toUpperCase();

  generateQuestion();
  startTimer();

}

/* QUESTION */

function generateQuestion(){

  if(!gameActive) return;

  let num1;
  let num2;
  let operator;

  if(selectedLevel === "veryeasy"){

    operator = "+";
    num1 = random(1,15);
    num2 = random(1,15);
    correctAnswer = num1 + num2;
  }

  else if(selectedLevel === "easy"){

    const ops = ["+","-"];
    operator = ops[random(0,1)];

    num1 = random(1,30);
    num2 = random(1,30);

    if(operator === "+"){
      correctAnswer = num1 + num2;
    }else{
      if(num2 > num1){
        [num1,num2] = [num2,num1];
      }
      correctAnswer = num1 - num2;
    }
  }

  else if(selectedLevel === "normal"){

    const ops = ["×","÷"];
    operator = ops[random(0,1)];

    if(operator === "×"){
      num1 = random(1,12);
      num2 = random(1,12);
      correctAnswer = num1 * num2;
    }else{
      num2 = random(1,12);
      correctAnswer = random(1,12);
      num1 = num2 * correctAnswer;
    }
  }

  else if(selectedLevel === "hard"){

    const mode = random(1,2);

    if(mode === 1){
      const n = random(3,6);
      correctAnswer = 1;
      for(let i=2;i<=n;i++) correctAnswer *= i;

      document.getElementById("question").innerText = `${n}!`;
      generateChoices();
      return;
    }else{
      const base = random(20,500);
      const percent = [10,20,25,50][random(0,3)];

      correctAnswer = (base * percent) / 100;

      document.getElementById("question").innerText =
      `${percent}% dari ${base}`;
      generateChoices();
      return;
    }
  }

  document.getElementById("question")
  .innerText =
  `${num1} ${operator} ${num2}`;

  generateChoices();
}

/* CHOICES */

function generateChoices(){

  let answers = [correctAnswer];

  while(answers.length < 3){

    let fake =
    correctAnswer + random(-15,15);

    if(
      fake >= 0 &&
      fake !== correctAnswer &&
      !answers.includes(fake)
    ){
      answers.push(fake);
    }
  }

  answers.sort(() => Math.random() - 0.5);

  for(let i=0;i<3;i++){

    const btn =
    document.getElementById("btn"+i);

    btn.innerText = answers[i];
    btn.dataset.value = answers[i];
  }
}

/* ANSWER */

window.selectAnswer = async function(index){

  if(!gameActive) return;

  const selected =
  parseInt(
    document.getElementById("btn"+index)
    .dataset.value
  );

  const message =
  document.getElementById("message");

  if(selected === correctAnswer){

    playCorrectSound();

    score++;

    document.getElementById("score")
    .innerText = score;

    message.style.color = "#00ff9d";
    message.innerText = "🔥 BENAR!";

    if(score > bestScore){

      bestScore = score;

      localStorage.setItem(
        "hitungcepat_best",
        bestScore
      );

      document.getElementById("bestScore")
      .innerText = bestScore;
    }

    generateQuestion();
  }

  else{

    clearInterval(timer);

    gameActive = false;

    message.style.color = "#ff5e7e";
    playWrongSound();

    message.innerText = "❌ SALAH!";

    document.getElementById("question")
    .innerText = "GAME OVER";

    document.getElementById("gameOver")
    .innerText =
    `🏆 SKOR AKHIR: ${score}`;

    const playerName =
    document.getElementById("playerName")
    .value || "Player";

    await saveScore(playerName,score);

    }
}

/* TIMER */

function startTimer(){

  timer = setInterval(() => {

    timeLeft--;

    document.getElementById("time")
    .innerText = timeLeft;

    if(timeLeft <= 0){

      clearInterval(timer);

      gameActive = false;

      document.getElementById("question")
      .innerText = "WAKTU HABIS";

      document.getElementById("gameOver")
      .innerText =
      `🏆 SKOR AKHIR: ${score}`;
    }

  },1000);
}

/* RESTART */

window.restartGame = function(){

  startGame();
}

/* BACK MENU */

window.backMenu = function(){

  clearInterval(timer);

  gameActive = false;

  document.getElementById("gameScreen")
  .style.display = "none";

  document.getElementById("menuScreen")
  .style.display = "block";
}




/* SOUND SYSTEM */
let audioCtx;

document.addEventListener('click', ()=>{
  initAudio();
},{once:true});

function initAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    startBackgroundMusic();
  }
}

function playCorrectSound(){
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = "triangle";
  osc.frequency.setValueAtTime(700, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(1100, audioCtx.currentTime + 0.15);
  gain.gain.setValueAtTime(0.14, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.2);
}


function playWrongSound(){
  initAudio();

  // Arcade-style fail sound
  const notes = [420, 320, 220, 140];

  notes.forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;

    gain.gain.setValueAtTime(0.10, audioCtx.currentTime + i * 0.08);
    gain.gain.exponentialRampToValueAtTime(
      0.001,
      audioCtx.currentTime + i * 0.08 + 0.12
    );

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start(audioCtx.currentTime + i * 0.08);
    osc.stop(audioCtx.currentTime + i * 0.08 + 0.12);
  });
}


let bgmStarted = false;
function startBackgroundMusic(){
  if(bgmStarted) return;
  bgmStarted = true;

  setInterval(()=>{
    if(!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    const notes = [220,262,330,392,330,262];
    osc.frequency.value = notes[Math.floor(Math.random()*notes.length)];
    osc.type = "sine";

    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.35);
  }, 450);
}

</script>

</body>
</html>
